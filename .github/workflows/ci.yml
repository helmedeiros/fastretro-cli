name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)" || (echo "gofmt failed:"; gofmt -l ./cmd ./internal; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test with race detection
        run: go test ./... -race -v

      - name: Test with coverage
        run: |
          go test ./... -coverprofile=coverage.out -race
          go tool cover -func=coverage.out

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -o bin/fastretro ./cmd/fastretro
